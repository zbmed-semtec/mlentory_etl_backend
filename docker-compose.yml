version: '3.8'

services:
  # =============================================================================
  # Core Infrastructure Services
  # Any modification to this file has an impact on the following:
  # - documentation (Relevant README.md),
  # - the .env file or the .env.example file,
  # - the Makefile, and
  # - the other Docker files.
  # =============================================================================
  
  neo4j:
    profiles: ["etl", "api", "complete", "mcp"]
    image: neo4j:${NEO4J_VERSION:-5.14.0}
    container_name: mlentory-neo4j
    ports:
      - "${NEO4J_BROWSER_PORT:-7474}:7474"  # HTTP Browser
      - "${NEO4J_BOLT_PORT:-7687}:7687"      # Bolt protocol
    env_file:
      - .env
    environment:
      # NEO4J_AUTH: neo4j/password
      - NEO4J_PLUGINS=["apoc", "n10s"]
    volumes:
      - ./config/neo4j/data:/data
      - ./config/neo4j/logs:/logs
      - ./config/neo4j/plugins:/plugins
      - ./config/neo4j/import:/var/lib/neo4j/import
      - ./config/neo4j/conf:/conf
    networks:
      - mlentory-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 500s
      timeout: 10s
      retries: 3
      start_period: 40s

  elasticsearch:
    profiles: ["etl", "api", "complete", "mcp"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.2
    container_name: mlentory-elasticsearch
    ports:
      - "9201:9200"
      - "9301:9300"
    env_file:
      - .env
    environment:
      - node.name=elastic
      - "transport.host=localhost"
      - "xpack.security.enabled=false"  # Disable security features for development, needs to be enabled for production
      - discovery.type=single-node  #  Use single-node discovery for development
      # - cluster.initial_master_nodes=elastic   # Use this for production
      - cluster.name=es-docker-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      # - "bootstrap.system_call_filter=false"   # Is not required for version 8.0 and above
      # - node.max_local_storage_nodes=2
      # Disk watermark settings to prevent allocation issues when disk is nearly full
      - "cluster.routing.allocation.disk.watermark.low=95%"  # Start warning at 85% disk usage
      - "cluster.routing.allocation.disk.watermark.high=97%" # High watermark at 97% as requested
      - "cluster.routing.allocation.disk.watermark.flood_stage=98%" # Flood stage at 98%
      - "cluster.info.update.interval=1m" # Update cluster info every minute
    volumes:
      - ./config/elasticsearch/data:/usr/share/elasticsearch/data
    networks:
      - mlentory-network

  # =============================================================================
  # Dagster Orchestration
  # =============================================================================

  dagster-postgres:
    profiles: ["etl", "complete"]
    image: postgres:15-alpine
    container_name: mlentory-dagster-postgres
    environment:
      POSTGRES_USER: ${DAGSTER_POSTGRES_USER:-dagster}
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-dagster_password_change_me}
      POSTGRES_DB: ${DAGSTER_POSTGRES_DB:-dagster}
    volumes:
      - dagster_postgres_data:/var/lib/postgresql/data
    networks:
      - mlentory-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAGSTER_POSTGRES_USER:-dagster}"]
      interval: 10s
      timeout: 5s
      retries: 5


  dagster-webserver:
    profiles: ["etl", "complete"]
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.dagster
    container_name: mlentory-dagster-webserver
    ports:
      - "${DAGSTER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=${DAGSTER_HOME:-/opt/dagster/dagster_home}
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER:-dagster}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD:-dagster_password_change_me}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB:-dagster}
      - DAGSTER_POSTGRES_HOST=dagster-postgres
      - DATA_DIR=${DATA_DIR:-/data}
      - APP_CYPHER_QUERY_MAX_LEN=10000
    volumes:
      - ./etl:/opt/dagster/app/etl
      - ./etl_extractors:/opt/dagster/app/etl_extractors
      - ./etl_transformers:/opt/dagster/app/etl_transformers
      - ./etl_loaders:/opt/dagster/app/etl_loaders
      - ./tests:/opt/dagster/app/tests
      - ./config/etl:/opt/dagster/app/config/etl	
      - ./schemas:/opt/dagster/app/schemas
      - ./data:/data
      - dagster_home:/opt/dagster/dagster_home
      - ./deploy/dagster/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - ./deploy/dagster/workspace.yaml:/opt/dagster/dagster_home/workspace.yaml:ro
    networks:
      - mlentory-network
    depends_on:
      dagster-postgres:
        condition: service_healthy
    command: dagster-webserver -w /opt/dagster/dagster_home/workspace.yaml -h 0.0.0.0 -p 3000

  # =============================================================================
  # MLentory API
  # =============================================================================

  api:
    profiles: ["api", "complete"]
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: mlentory-api
    ports:
      - "8008:8000"
    env_file:
      - .env
    volumes:
      - ./api:/app/api
      - ./etl_loaders:/app/etl_loaders
      - ./schemas:/app/schemas
    networks:
      - mlentory-network
    depends_on:
      - neo4j
      - elasticsearch
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  # =============================================================================
  # MLentory MCP API
  # =============================================================================

  mcp-api:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: mcp_api/Dockerfile
    container_name: mlentory-mcp-api
    env_file:
      - .env
    volumes:
      - ./mcp_api:/app/mcp_api
      - ./api:/app/api
      - ./etl_loaders:/app/etl_loaders
      - ./etl_extractors:/app/etl_extractors
      - ./schemas:/app/schemas
    networks:
      - mlentory-network
    depends_on:
      - neo4j
      - elasticsearch
    ports:
      - "8009:8009"
    stdin_open: true  # Keep stdin open for MCP stdio communication
    tty: true         # Allocate a pseudo-TTY
    command: python -m mcp_api.server

  ngrok:
    profiles: ["mcp"]
    image: ngrok/ngrok:latest
    container_name: mlentory-ngrok
    # ports:
    #   - "80:80"
    environment:
      - NGROK_AUTHTOKEN=$NGROK_AUTHTOKEN
    command: http --url=$NGROK_URL mlentory-mcp-api:8009
    # network:
    #   - host
    networks:
      - mlentory-network

  # =============================================================================
  # STELLA SERVICES
  #=============================================================================

  stella-app:
    profiles: ["stella"]
    image: thestellaproject/stella-app:latest
    container_name: stella-app
    volumes:
      - stella_data:/data
    expose:
      - "8005"
    ports:
      - "${STELLA_APP_PORT:-8080}:8005"
    networks:
      - mlentory-network
    environment:
      FLASK_APP: app.app
      FLASK_CONFIG: postgres
      INTERLEAVE: "True"
      BULK_INDEX: "False"
      DELETE_SENT_SESSION: "True"
      INTERVAL_DB_CHECK: 3
      SESSION_EXPIRATION: 6
      SESSION_KILL: 120
      SENDFEEDBACK: "True"

      # Systems
      SYSTEMS_CONFIG: |
        {
            "mlentory_base": {"type": "ranker", "base": true, "docid": "mlentory_id", "hits_path": "$.models", "url": "http://mlentory-base:5000"},
            "mlentory_experiment": {"type": "ranker", "docid": "mlentory_id", "hits_path": "$.models", "url": "http://mlentory-experiment:5000"}
        }

      # Stella Server
      STELLA_SERVER_ADDRESS: ${STELLA_SERVER_ADDRESS:-http://stella-server:8000}
      STELLA_SERVER_USER: ${STELLA_SERVER_USER:-site@stella-project.org}
      STELLA_SERVER_PASS: ${STELLA_SERVER_PASS:-pass}
      STELLA_SERVER_USERNAME: ${STELLA_SERVER_USERNAME:-site}

      # Database
      POSTGRES_USER: ${STELLA_POSTGRES_USER:-postgres}
      POSTGRES_PW: ${STELLA_POSTGRES_PW:-change-me}
      POSTGRES_DB: ${STELLA_POSTGRES_DB:-postgres}
      POSTGRES_URL: stella-app-db:5430

    command: gunicorn -w 2 --timeout 60 -b :8005 'app.app:create_app()'
    depends_on:
      stella-app-db:
        condition: service_healthy
      stella-mlentory-base:
        condition: service_started
      stella-mlentory-experiment:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  stella-app-db:
    profiles: ["stella"]
    image: postgres:16
    container_name: stella-app-db
    expose:
      - "5430"
    ports:
      - "${STELLA_APP_DB_PORT:-5430}:5430"
    networks:
      - mlentory-network
    environment:
      - POSTGRES_USER=${STELLA_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${STELLA_POSTGRES_PW:-change-me}
      - POSTGRES_DB=${STELLA_POSTGRES_DB:-postgres}
    command: -p 5430
    volumes:
      - stella_app_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STELLA_POSTGRES_USER:-postgres} -d ${STELLA_POSTGRES_DB:-postgres} -p 5430"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  stella-mlentory-base:
    profiles: ["stella"]
    image: thestellaproject/mlentory-base:latest
    container_name: mlentory-base
    networks:
      - mlentory-network
    ports:
      - "${STELLA_EXPERIMENT_PORT:-5000}:5000"
    command: ["gunicorn", "-w", "2", "-b", "0.0.0.0:5000", "app:app"]
    restart: unless-stopped

  stella-mlentory-experiment:
    profiles: ["stella"]
    image: thestellaproject/mlentory-base:latest
    container_name: mlentory-experiment
    networks:
      - mlentory-network
    ports:
      - "${STELLA_EXPERIMENT_PORT:-5001}:5000"
    command: ["gunicorn", "-w", "2", "-b", "0.0.0.0:5000", "app:app"]
    restart: unless-stopped

  stella-server:
    profiles: ["stella"]
    image: thestellaproject/stella-server:latest
    container_name: stella-server
    volumes:
      - stella_server_db_data:/var/lib/postgresql/data
    expose:
      - "8000"
    ports:
      - "${STELLA_SERVER_PORT:-8004}:8000"
    networks:
      - mlentory-network
    environment:
      # Config
      FLASK_APP: app.app
      FLASK_CONFIG: postgres
      SECRET_KEY: ${STELLA_SERVER_SECRET_KEY:-change-me}
      ADMIN_MAIL: ${STELLA_SERVER_ADMIN_MAIL:-admin@stella-project.org}
      ADMIN_PASS: ${STELLA_SERVER_ADMIN_PASS:-pass}
      SITE_MAIL: ${STELLA_SERVER_SITE_MAIL:-site@stella-project.org}
      SITE_PASS: ${STELLA_SERVER_SITE_PASS:-pass}
      EXPERIMENTER_MAIL: ${STELLA_SERVER_EXPERIMENTER_MAIL:-experimenter@stella-project.org}
      EXPERIMENTER_PASS: ${STELLA_SERVER_EXPERIMENTER_PASS:-pass}
      AUTOMATOR_GH_KEY: ${STELLA_SERVER_AUTOMATOR_GH_KEY:-}
      # Database
      POSTGRES_USER: ${STELLA_SERVER_POSTGRES_USER:-postgres}
      POSTGRES_PW: ${STELLA_SERVER_POSTGRES_PW:-change-me}
      POSTGRES_DB: ${STELLA_SERVER_POSTGRES_DB:-postgres}
      POSTGRES_URL: stella-server-db:5432
      STELLA_APP_ADDRESS: |
        [
          "http://stella-app:8005"
        ]
    command: gunicorn -w 2 --timeout 60 -b :8000 'app.app:create_app()'
    depends_on:
      stella-server-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  stella-server-db:
    profiles: ["stella"]
    image: postgres:16
    container_name: stella-server-db
    expose:
      - "5432"
    ports:
      - "${STELLA_SERVER_DB_PORT:-5433}:5432"
    networks:
      - mlentory-network
    environment:
      - POSTGRES_USER=${STELLA_SERVER_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${STELLA_SERVER_POSTGRES_PW:-change-me}
      - POSTGRES_DB=${STELLA_SERVER_POSTGRES_DB:-postgres}
    command: -p 5432
    volumes:
      - ../../stella-mlentory/data/db-server-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STELLA_SERVER_POSTGRES_USER:-postgres} -d ${STELLA_SERVER_POSTGRES_DB:-postgres} -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Networks
# =============================================================================

networks:
  mlentory-network:
    driver: bridge
    name: mlentory-network

# =============================================================================
# Volumes
# =============================================================================

volumes:
  neo4j_data:
    name: mlentory-neo4j-data
  neo4j_logs:
    name: mlentory-neo4j-logs
  neo4j_import:
    name: mlentory-neo4j-import
  neo4j_plugins:
    name: mlentory-neo4j-plugins
  elasticsearch_data:
    name: mlentory-elasticsearch-data
  dagster_postgres_data:
    name: mlentory-dagster-postgres-data
  dagster_home:
    name: mlentory-dagster-home
  stella_data:
    name: stella-data
  stella_app_db_data:
    name: stella-app-db-data
  stella_server_db_data:
    name: stella-server-db-data
